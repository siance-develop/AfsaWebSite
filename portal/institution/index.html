<script language="JavaScript">
$(function(){

	//全てを閉じる
	$('.acc_base > article').hide();

	//クリックアクション設定
	$('h2.accordion-title').click(function() {
		//オブジェクトを代入
		var hitItem = $(this).next();
		//開いている要素
		var openItem = hitItem.siblings('article:visible');

		// 自分自身のクラスをトグル
		$(this).toggleClass('acct_active');

		// 他の見出しはクラスを外す
		$('h2.accordion-title').not(this).removeClass('acct_active');

		//開いている要素があれば最初に閉じる
		if (openItem.length ) {
			openItem.slideUp('fast', function() {
				hitItem.slideToggle('fast');
			});
		} else {
			hitItem.slideToggle('fast');
		}
	});
});
</script>
<script>
jQuery(function ($) {

  // ヘッダーの高さを取得（必要に応じて調整）
  function getHeaderHeight() {
    return $('header').outerHeight() || 0;
  }

  $('a[href^="#"]').on('click', function (e) {

    var href = $(this).attr('href');

    // "#" 単体や空リンクは除外
    if (href === '#' || href === '') {
      return;
    }

    var target = $(href);

    // 対象要素が存在しない場合は通常動作
    if (!target.length) {
      return;
    }

    e.preventDefault();

    var headerHeight = getHeaderHeight();
    var position = target.offset().top - headerHeight;

    $('html, body').stop().animate(
      { scrollTop: position },
      400,
      'swing'
    );
  });

});
</script>
